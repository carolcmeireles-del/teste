[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."anthropic"]
  timeout = 120

[[redirects]]
  from = "/.netlify/functions/anthropic"
  to = "/.netlify/functions/anthropic"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
